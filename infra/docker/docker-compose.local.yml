services:
  postgres:
    image: postgres:16
    container_name: beyul-postgres
    environment:
      POSTGRES_DB: beyul
      POSTGRES_USER: beyul
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: beyul-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
